body {

}

/* الحاوية */
.container {
    width: 60%;
    margin: auto;
    text-align: center;
}

/* الفهرس */
.item {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
    background: white;
}

.item:hover {
    background: #eaeaea;
}

/* منطقة العرض */
#viewer {
    margin-top: 40px;
    overflow: hidden;
}

#pageImg {
    max-width: 80%;
    cursor: grab;
    transition: transform 0.2s;
}

/* عند السحب */
.dragging {
    cursor: grabbing;
}

/* تكبير */
.zoomed {
    transform: scale(1.6);
}

/* زر الرجوع */
#backBtn {
    display: none;
    width: 40px;
    cursor: pointer;
    margin-bottom: 10px;
}
</style>

// إنشاء الفهرس
let listDiv = document.getElementById("list");

toc.forEach(item => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = item[0] + " (" + item[1] + ")";

    div.onclick = function() {
        openPage(item[1]);
    };

    listDiv.appendChild(div);
});

// فتح الصفحة
function openPage(page) {
    let real = page + 2;
    let img = "a" + real + ".png";

    let pageImg = document.getElementById("pageImg");
    pageImg.src = img;

    // إظهار زر الرجوع
    document.getElementById("backBtn").style.display = "inline";

    // إزالة التكبير
    pageImg.classList.remove("zoomed");

    // النزول الصحيح للصورة
    setTimeout(() => {
        document.getElementById("viewer").scrollIntoView({
            behavior: "smooth",
            block: "start"
        });
    }, 100);
}

// تكبير 150%
let pageImg = document.getElementById("pageImg");

pageImg.onclick = function() {

// زر الرجوع
document.getElementById("backBtn").onclick = function() {
